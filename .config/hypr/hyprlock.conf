$font = SpaceMono
$monitor = # Specifies which monitor to display only

general {
    hide_cursor = true
}

background {
    monitor = $monitor
    path = /home/wuki/Desktop/Wallpaper/day/magicnoon.png
    blur_passes = 3
    blur_size = 12
    noise = 0.1
    vibrancy = 0.8
    vibrancy_darkness = 0.25
    brightness = .10
}

input-field {
    monitor = $monitor
    size = 18%, 5%
    outline_thickness = 0

    inner_color = rgba(255, 255, 255, .025) 
    outer_color = rgba(95, 175, 255, .2)
    check_color = rgba(255, 255, 255, .2)
    fail_color = rgba(95, 175, 255, .2)
    font_color = rgba(255, 255, 255, 1)
    capslock_color = rgba(255, 0, 150, .2)

    fade_on_empty = false

    font_family = $font
    placeholder_text = >w<
    fail_text = booo :p

    dots_text_format = *
    dots_size = 0.35
    dots_spacing = 0.4

    position = 0, -20
    halign = center
    valign = center

    rounding = 8
}

# TIME
label {
    monitor = $monitor
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 100
    font_family = $font
    color = rgba(255, 255, 255, 1)

    position = 0, 220
    halign = center
    valign = center
}

# DATE
label {
    monitor = $monitor
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    color = rgba(95,175,255, 1)
    font_size = 24
    font_family = $font

    position = 0, 140
    halign = center
    valign = center
}

