################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor = HDMI-A-1, highres highrr, -1920x0, 1
# monitor = DP-2, 2560x1440@180.00Hz, 0x0, 1.3
# monitor = DP-2, 2560x1440@180.00Hz, 0x0, 1.33333334, bitdepth, 10, cm, hdr
# monitor = eDP-1, 1920x1080@60.00hz, 0x0, 1.25

monitorv2 {
  output = DP-2
  mode = 2560x1440@180.00Hz
  position = 0x0
  scale = 1

}

xwayland {
  force_zero_scaling = true
}

################
### KEYWORDS ###
################

$terminal = kitty 
$fileManager = nautilus
$menu = tofi-drun --include /var/lib/flatpak/exports/share/applications/ | xargs hyprctl dispatch exec --

#################
### AUTOSTART ###
#################

exec-once = wayle panel start
exec-once = fcitx5 -d
exec-once = awww-daemon
exec-once = xrdb -merge .Xresources
exec-once = clipse -listen

# CUSTOM
exec-once = systemctl --user start wallpaper-changer.timer

# HYPR UTILS
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle
exec-once = hyprsunset    
# exec-once = hyprlock

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum 
env = QT_QPA_PLATFORM,wayland
env = EDITOR,nvim

#####################
### LOOK AND FEEL ###
#####################

misc {
    vrr = 0
    focus_on_activate = true
}  

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    layout = master 
    gaps_in = 4
    gaps_out = 11
    border_size = 3

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(95,175,255,.8)
    col.inactive_border = rgba(100,100,100,.15)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}


# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 8
    
    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 1

    blur {
        # https://wiki.hyprland.org/Configuring/Variables/#blur

        enabled = true
        xray = true
        ignore_opacity = true
        popups = true

        brightness = 1
        size = 12
        passes = 3
        vibrancy = 0.8
        vibrancy_darkness = 0.25
        noise = .1

    }

    shadow {
        enabled = true
        color = rgba(0,0,0,0.50)
        range = 30
        scale = 1

        }
}


# ----------------------------------------------------- 
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#
# name "Fast"
# credit https://github.com/mylinuxforwork/dotfiles
# ----------------------------------------------------- 
animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}


dwindle {
    # pseudotile = true # Master switch for pseudotiling. Enubling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    # no_gaps_when_only=true
    new_status = slave
    orientation = right
    mfact = 0.66
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
}


#############
### INPUT ###
#############
# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    float_switch_override_focus = 1

    sensitivity = .5 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        disable_while_typing = false
        natural_scroll = false
    }
}

# # https://wiki.hyprland.org/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = false
# }

cursor {
    enable_hyprcursor = true
    persistent_warps = true
    warp_on_change_workspace = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

####################
### KEYBINDINGSS ###
####################
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, A, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
# bind = $mainMod, G, settiled
bind = $mainMod, G, fullscreenstate, 1
bind = $mainMod, J, fullscreen, 0
bind = $mainMod, L, exec, hyprlock


# Tiles and Focuses
bind = $mainMod, F, settiled
bind = $mainMod, F, layoutmsg,swapwithmaster master # Gives most focus for tiled WINDOWS
bind = $mainMod, K, layoutmsg, swapnext
bind = $mainMod, I, layoutmsg, swapprev
## floats and centers
bind = $mainMod, V, togglefloating
bind = $mainMod, V, centerwindow
bind = $mainMod, P, exec, $menu

# bar reset
# bind = $mainMod SHIFT, R, exec, hyprpanel

#Clipboard Binds
bind = $mainMod SHIFT, V, exec, [float] kitty --class clipse -e clipse

# Screenshot binds
bind = $mainMod, S, exec, hyprshot -m region -o $HOME/Pictures -z
bind = $mainMod SHIFT, S, exec, hyprshot -m output -m active -o $HOME/Pictures -z

# Colorpicker bind
bind = $mainMod, Next, exec, hyprpicker -a --no-fancy

#Resize Window with Keyboard
bind = $mainMod SHIFT, right, resizeactive,  20 0
bind = $mainMod SHIFT, left , resizeactive, -20 0
bind = $mainMod SHIFT, up   , resizeactive,  0 -20
bind = $mainMod SHIFT, down , resizeactive,  0  20

# Audio
# binde =, XF86AudioRaiseVolume, exec, bash $HOME/.config/dunst/scripts/dunst-volume.sh +5%
# binde =, XF86AudioLowerVolume, exec, bash $HOME/.config/dunst/scripts/dunst-volume.sh -5%
# bind = , XF86AudioMute, exec, bash $HOME/.config/dunst/scripts/dunst-volume.sh toggle
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
# bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# bindel = ,XF86MonBrightnessUp, exec, dunstify -t 1000 -u low -a "changeBrightness" -h string:x-dunst-stack-tag:"brightness" "Brightness: $(brightnessctl g)/255" -i "$HOME/transparent-arch-theme/.config/dunst/img/brightness.svg"
# bindel = ,XF86MonBrightnessDown, exec, dunstify -t 1000 -u low -a "changeBrightness" -h string:x-dunst-stack-tag:"brightness" "Brightness: $(brightnessctl g)/255" -i "$HOME/transparent-arch-theme/.config/dunst/img/brightness.svg"
# bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Move focus with mainMod + arrow keys
bind = $mainMod, left, cyclenext, prev
bind = $mainMod, right, cyclenext
bind = $mainMod, left, alterzorder, top
bind = $mainMod, right, alterzorder, top

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, Z, togglespecialworkspace, magic
bind = $mainMod SHIFT, Z, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
 

# Floats, resizes and center new windows
# windowrule = match:float false, center on
windowrule = match:float false, size 1280 720
windowrule = match:float false, size 800 600
# windowrule = match:class (.*), float on

# Disable inactive windows border

$dark = .9
windowrule = match:class Spotify, opacity $dark
windowrule = match:class nemo, opacity $dark
windowrule = match:class org.gnome.Nautilus, opacity $dark
windowrule = match:class org.pulseaudio.pavucontrol, opacity $dark
windowrule = match:class vesktop, opacity $dark
windowrule = match:class drracket, opacity $dark
windowrule = match:class xdg-desktop-portal-gtk, opacity $dark
windowrule = match:class org.manjaro.pamac.manager, opacity $dark

windowrule = match:class org.gnome.FileRoller, opacity $dark
# windowrule = match:title .*Enter.* , opacity $dark # saving file in firefox lol
# windowrule = match:title .*Save.* , opacity $dark # saving file in firefox lol
# windowrule = match:title Open.* , opacity $dark # saving file in firefox lol
# windowrule = match:title File.* , opacity $dark # saving file in firefox lol

# Smart border and gaps
windowrule = match:workspace w[t1], match:float false, border_size 0
windowrule = match:workspace f[1], match:float true, border_size 0
windowrule = match:workspace f[1]w[2-99], match:float true, border_size 3
windowrule = match:workspace f[1]w[2-99], match:float false, border_size 3

workspace = f[1]w[2-99], gapsout:8
workspace = w[t2-99], gapsout:8
workspace = w[t2-99], rounding:true
workspace = s[true], gapsout:8, gapsin:8

# Blur
layerrule = blur on, match:namespace bar-0
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace launcher
layerrule = blur on, match:namespace notifications
layerrule = xray on, match:class tofi

## Hyprpanel
# windowrule = match:class gjs, opacity .99
layerrule = blur on, match:namespace ^(wayle.*)$
layerrule = blur_popups on, match:namespace ^(wayle.*)$
layerrule = xray on, match:namespace ^(wayle.*)$
layerrule = ignore_alpha .799, match:namespace ^(wayle.*)$
